name: Build Installers

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_NAME: ServiceProcess
  APP_VERSION: "1.0.0"
  APP_VENDOR: "Aress Software"
  APP_DESCRIPTION: "ActivePulse Desktop Agent"
  MAIN_CLASS: "com.activepulse.agent.ActivePulseApplication"
  # Fixed UUID — DO NOT change between releases (used for MSI upgrade detection)
  WIN_UPGRADE_UUID: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

jobs:

  # ═════════════════════════════════════════════════════════════════
  # 🪟 WINDOWS  (.msi + machine-wide auto-start script)
  # ═════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: mvn clean package -B

      - name: Prepare JAR
        shell: bash
        run: cp target/active-pulse-0.0.1-SNAPSHOT.jar target/app.jar

      - name: Create MSI Installer
        shell: pwsh
        run: |
          Write-Host "🚀 Building MSI with jpackage..."
          $javaHome = $env:JAVA_HOME
          Write-Host "Using JDK from: $javaHome"
          jpackage `
            --name $env:APP_NAME `
            --app-version $env:APP_VERSION `
            --description $env:APP_DESCRIPTION `
            --vendor $env:APP_VENDOR `
            --input target `
            --main-jar app.jar `
            --main-class $env:MAIN_CLASS `
            --type msi `
            --dest dist `
            --runtime $javaHome `
            --icon src/main/resources/tray-icon.ico `
            --win-shortcut `
            --win-menu `
            --win-menu-group "ActivePulse" `
            --win-dir-chooser `
            --win-upgrade-uuid $env:WIN_UPGRADE_UUID `
            --java-options "-Dfile.encoding=UTF-8" `
            --java-options "-Duser.timezone=Asia/Kolkata" `
            --java-options "-Xms64m" `
            --java-options "-Xmx256m"

      # Machine-wide auto-start: writes HKLM Run key + All Users Startup shortcut.
      # Must be run as Administrator AFTER msiexec /i ... ALLUSERS=1
      - name: Create Auto-Start Script
        shell: pwsh
        run: |
          Write-Host "📝 Creating machine-wide auto-start configuration script..."
          $scriptContent = @'
          # ActivePulse Machine-Wide Auto-Start Configuration
          # Run as Administrator after MSI install
          # Configures auto-start for ALL users on this machine

          $ErrorActionPreference = "Stop"

          $installPath   = "C:\Program Files\ServiceProcess"
          $exePath       = "$installPath\ServiceProcess.exe"
          $startupFolder = "C:\ProgramData\Microsoft\Windows\Start Menu\Programs\StartUp"
          $shortcutPath  = "$startupFolder\ActivePulse.lnk"

          Write-Host "Configuring ActivePulse auto-start (machine-wide)..."
          Write-Host "  Install Path : $installPath"
          Write-Host "  Executable   : $exePath"

          if (-not (Test-Path $exePath)) {
              Write-Host "ERROR: ActivePulse not found at $exePath"
              Write-Host "Install the MSI first with: msiexec /i ServiceProcess-1.0.0.msi /qn ALLUSERS=1"
              exit 1
          }

          # Method 1: HKLM Run key (machine-wide)
          Write-Host ""
          Write-Host "[1/2] Adding HKLM Run key..."
          try {
              Set-ItemProperty `
                  -Path  "HKLM:\Software\Microsoft\Windows\CurrentVersion\Run" `
                  -Name  "ActivePulseAgent" `
                  -Value "`"$exePath`"" `
                  -Type  String `
                  -Force
              Write-Host "      OK: HKLM Run key configured"
          } catch {
              Write-Host "      FAIL: $_"
          }

          # Method 2: All Users Startup folder shortcut (redundancy)
          Write-Host ""
          Write-Host "[2/2] Creating All Users Startup folder shortcut..."
          try {
              $WScript  = New-Object -ComObject WScript.Shell
              $Shortcut = $WScript.CreateShortcut($shortcutPath)
              $Shortcut.TargetPath       = $exePath
              $Shortcut.WorkingDirectory = $installPath
              $Shortcut.Description      = "ActivePulse Productivity Tracking"
              $Shortcut.Save()
              Write-Host "      OK: Startup shortcut created at $shortcutPath"
          } catch {
              Write-Host "      FAIL: $_"
          }

          Write-Host ""
          Write-Host "✅ Auto-start configuration completed"
          Write-Host "ActivePulse will start automatically for ALL users on this machine"
          Write-Host ""
          Write-Host "Verify with:"
          Write-Host "  reg query `"HKLM\Software\Microsoft\Windows\CurrentVersion\Run`" /v ActivePulseAgent"
          Write-Host "  dir `"$shortcutPath`""
          '@

          $scriptContent | Out-File -FilePath "dist\configure-autostart.ps1" -Encoding UTF8
          Write-Host "✅ Auto-start script created: dist\configure-autostart.ps1"

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ActivePulse-Windows-${{ env.APP_VERSION }}
          path: |
            dist/*.msi
            dist/*.ps1
          retention-days: 30

  # ═════════════════════════════════════════════════════════════════
  # 🐧 LINUX  (.deb)
  # Built on Ubuntu 22.04 for max compatibility:
  #   ✅ installs on 22.04
  #   ✅ installs on 24.04 (forward compatible)
  #   ⚠️  20.04 may need a separate build (older glibc)
  # ═════════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg-dev

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: mvn clean package -B

      - name: Prepare JAR
        run: cp target/active-pulse-0.0.1-SNAPSHOT.jar target/app.jar

      - name: Create DEB Installer
        run: |
          jpackage \
            --name "$APP_NAME" \
            --app-version "$APP_VERSION" \
            --description "$APP_DESCRIPTION" \
            --vendor "$APP_VENDOR" \
            --input target \
            --main-jar app.jar \
            --main-class "$MAIN_CLASS" \
            --type deb \
            --dest dist \
            --icon src/main/resources/tray-icon.png \
            --linux-shortcut \
            --linux-menu-group "Utility" \
            --linux-app-category "utility" \
            --linux-deb-maintainer "support@aressindia.net" \
            --java-options "-Dfile.encoding=UTF-8" \
            --java-options "-Duser.timezone=Asia/Kolkata" \
            --java-options "-Xms64m" \
            --java-options "-Xmx256m"

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: ActivePulse-Linux-${{ env.APP_VERSION }}
          path: dist/*.deb
          retention-days: 30

  # ═════════════════════════════════════════════════════════════════
  # 🍎 MAC ARM  (unchanged from original)
  # ═════════════════════════════════════════════════════════════════
  build-mac-arm:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (ARM)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: aarch64

      - name: Build JAR
        run: mvn clean package

      - name: Prepare JAR
        run: |
          ls target
          cp target/active-pulse-0.0.1-SNAPSHOT.jar target/app.jar

      - name: Create DMG (ARM)
        run: |
          jpackage \
            --name ServiceProcess-arm64 \
            --input target \
            --main-jar app.jar \
            --type dmg \
            --dest dist \
            --icon src/main/resources/tray-icon.icns

      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: dist/*

  # ═════════════════════════════════════════════════════════════════
  # 🍎 MAC INTEL  (unchanged from original)
  # ═════════════════════════════════════════════════════════════════
  build-mac-intel:
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (x64)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: x64

      - name: Build JAR
        run: mvn clean package

      - name: Prepare JAR
        run: |
          ls target
          cp target/active-pulse-0.0.1-SNAPSHOT.jar target/app.jar

      - name: Create DMG (Intel)
        run: |
          jpackage \
            --name ServiceProcess-x64 \
            --input target \
            --main-jar app.jar \
            --type dmg \
            --dest dist \
            --icon src/main/resources/tray-icon.icns

      - uses: actions/upload-artifact@v4
        with:
          name: mac-x64
          path: dist/*
