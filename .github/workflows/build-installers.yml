name: Build Installers

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # 🪟 WINDOWS
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: mvn clean package

      - name: Prepare JAR
        shell: bash
        run: |
          ls target
          cp target/active-pulse-0.0.1-SNAPSHOT.jar target/app.jar

      - name: Create MSI Installer
        shell: pwsh
        run: |
          jpackage `
            --name ServiceProcess `
            --input target `
            --main-jar app.jar `
            --type msi `
            --dest dist `
            --icon src/main/resources/tray-icon.ico `
            --win-console `
            --win-shortcut `
            --win-menu `
            --win-menu-group "ServiceProcess" `
            --win-dir-chooser `
            --resource-dir .

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*


  # 🐧 LINUX
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install required tools
        run: |
          sudo apt update
          sudo apt install -y fakeroot dpkg-dev

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: mvn clean package

      - name: Prepare JAR
        run: |
          ls target
          cp target/active-pulse-0.0.1-SNAPSHOT.jar target/app.jar

      - name: Make script executable
        run: chmod +x linux-startup.sh

      - name: Create DEB
        run: |
          jpackage \
            --name "ServiceProcess" \
            --input target \
            --main-jar app.jar \
            --type deb \
            --dest dist \
            --icon src/main/resources/tray-icon.png \
            --linux-shortcut \
            --linux-menu-group "Utility" \

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/*


  # 🍎 MAC ARM
  build-mac-arm:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (ARM)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: aarch64

      - name: Build JAR
        run: mvn clean package

      - name: Prepare JAR
        run: |
          ls target
          cp target/active-pulse-0.0.1-SNAPSHOT.jar target/app.jar

      - name: Create DMG (ARM)
        run: |
          jpackage \
            --name ServiceProcess-arm64 \
            --input target \
            --main-jar app.jar \
            --type dmg \
            --dest dist \
            --icon src/main/resources/tray-icon.icns

      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: dist/*


  # 🍎 MAC INTEL
  build-mac-intel:
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (x64)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          architecture: x64

      - name: Build JAR
        run: mvn clean package

      - name: Prepare JAR
        run: |
          ls target
          cp target/active-pulse-0.0.1-SNAPSHOT.jar target/app.jar

      - name: Create DMG (Intel)
        run: |
          jpackage \
            --name ServiceProcess-x64 \
            --input target \
            --main-jar app.jar \
            --type dmg \
            --dest dist \
            --icon src/main/resources/tray-icon.icns

      - uses: actions/upload-artifact@v4
        with:
          name: mac-x64
          path: dist/*


