# Scheduler identity
org.quartz.scheduler.instanceName     = ActivePulseScheduler
org.quartz.scheduler.instanceId       = AUTO
org.quartz.scheduler.skipUpdateCheck  = true

# Thread pool
# 4 threads: input-flush, screenshot, sys-metrics run concurrently
org.quartz.threadPool.class           = org.quartz.simpl.SimpleThreadPool
org.quartz.threadPool.threadCount     = 4
org.quartz.threadPool.threadPriority  = 5
org.quartz.threadPool.threadsInheritContextClassLoaderOfInitializingThread = true

# Job store RAM only (no DB, no clustering needed for desktop agent)
org.quartz.jobStore.class             = org.quartz.simpl.RAMJobStore

# Silence Quartz's internal logging
org.quartz.scheduler.jmx.export       = false